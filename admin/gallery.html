<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gallery — Sweet Mee Nails Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/styles.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar" id="admin-sidebar"></aside>
  <main class="admin-main">
    <h1 id="page-title">Gallery</h1>
    <label class="btn btn-primary" style="display:inline-flex;margin:1rem 0;cursor:pointer">
      <span id="upload-label"></span>
      <input type="file" id="upload-input" accept="image/*" class="hidden" />
    </label>
    <div id="gallery-grid" class="grid grid-3"></div>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/admin-shell.js"></script>
<script>
let images = [];

async function loadImages() {
  const { data } = await sb.from("gallery_images").select("*").order("display_order");
  images = data || [];
  renderGrid();
}

function renderGrid() {
  const lang = getLang();
  document.getElementById("gallery-grid").innerHTML = images.map((img) => `
    <div class="card" style="padding:0;overflow:hidden">
      <img src="${img.image_url}" style="aspect-ratio:1;object-fit:cover;width:100%" />
      <div style="padding:0.75rem">
        <input data-id="${img.id}" data-field="style_name_en" value="${img.style_name_en || ""}" placeholder="${lang === "fr" ? "Nom du style (EN)" : "Style name (EN)"}" style="font-size:0.75rem;margin-bottom:0.4rem" />
        <input data-id="${img.id}" data-field="style_name_fr" value="${img.style_name_fr || ""}" placeholder="${lang === "fr" ? "Nom du style (FR)" : "Style name (FR)"}" style="font-size:0.75rem;margin-bottom:0.4rem" />
        <button data-id="${img.id}" data-url="${img.image_url}" class="remove-img" style="background:none;border:none;color:#dc2626;font-size:0.75rem;cursor:pointer">${lang === "fr" ? "Retirer" : "Remove"}</button>
      </div>
    </div>`).join("");

  document.querySelectorAll("[data-field]").forEach((input) => {
    input.addEventListener("blur", async () => {
      await sb.from("gallery_images").update({ [input.dataset.field]: input.value }).eq("id", input.dataset.id);
    });
  });
  document.querySelectorAll(".remove-img").forEach((btn) => {
    btn.addEventListener("click", async () => {
      await sb.from("gallery_images").delete().eq("id", btn.dataset.id);
      const path = btn.dataset.url.split("/gallery/")[1];
      if (path) await sb.storage.from("gallery").remove([path]);
      loadImages();
    });
  });
}

async function renderContent() {
  const lang = getLang();
  document.getElementById("page-title").textContent = lang === "fr" ? "Galerie" : "Gallery";
  document.getElementById("upload-label").textContent = lang === "fr" ? "+ Ajouter une image" : "+ Upload image";
  document.getElementById("upload-input").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const path = `${crypto.randomUUID()}.${file.name.split(".").pop()}`;
    const { error } = await sb.storage.from("gallery").upload(path, file);
    if (!error) {
      const { data: pub } = sb.storage.from("gallery").getPublicUrl(path);
      await sb.from("gallery_images").insert({ image_url: pub.publicUrl, display_order: images.length });
      loadImages();
    }
    e.target.value = "";
  });
  await loadImages();
}
document.addEventListener("DOMContentLoaded", () => initAdminPage(renderContent));
</script>
</body>
</html>
