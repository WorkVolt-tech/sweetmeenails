<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login — Sweet Mée Nails</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/styles.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body style="display:flex;min-height:100vh;align-items:center;justify-content:center">
<div class="card" style="width:100%;max-width:360px">
  <div style="text-align:center;margin-bottom:1.5rem">
    <div class="logo" style="justify-content:center;display:flex">Sweet Mée Nails</div>
    <p class="text-muted" id="login-subtitle" style="margin-top:0.25rem"></p>
  </div>
  <form id="login-form">
    <div class="field"><label>Email</label><input type="email" id="login-email" required /></div>
    <div class="field"><label id="pw-label">Password</label><input type="password" id="login-password" required /></div>
    <p id="login-error" class="error-text"></p>
    <button class="btn btn-primary" style="width:100%" id="login-submit">Sign in</button>
  </form>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/i18n.js"></script>
<script>
const lang = getLang();
document.getElementById("login-subtitle").textContent = lang === "fr" ? "Connexion administrateur" : "Administrator sign in";
document.getElementById("pw-label").textContent = lang === "fr" ? "Mot de passe" : "Password";
document.getElementById("login-submit").textContent = lang === "fr" ? "Se connecter" : "Sign in";

document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    document.getElementById("login-error").textContent = lang === "fr" ? "Courriel ou mot de passe invalide." : "Invalid email or password.";
    return;
  }
  location.href = "dashboard.html";
});

// Already logged in? Skip straight to the dashboard.
sb.auth.getSession().then(({ data }) => { if (data.session) location.href = "dashboard.html"; });
</script>
</body>
</html>
