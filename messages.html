<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Appointments — Sweet Mee Nails Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/styles.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar" id="admin-sidebar"></aside>
  <main class="admin-main">
    <h1 id="page-title">Appointments</h1>
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin:1.25rem 0">
      <input id="search-box" style="max-width:280px" placeholder="Search…" />
      <select id="status-filter" style="max-width:220px"></select>
    </div>
    <div class="card" style="padding:0;overflow-x:auto">
      <table id="appointments-table"></table>
    </div>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/format.js"></script>
<script src="../assets/js/admin-shell.js"></script>
<script>
const STATUSES = ["pending","accepted","rejected","confirmed","cancelled_by_client","cancelled_by_salon","completed","no_show","reschedule_requested"];
let allRows = [];

async function loadRows() {
  const statusFilter = document.getElementById("status-filter").value;
  let query = sb.from("appointments").select("*, clients(full_name, phone_normalized, email), services(name_en, name_fr)")
    .order("appointment_date", { ascending: false }).order("start_time", { ascending: false }).limit(150);
  if (statusFilter !== "all") query = query.eq("status", statusFilter);
  const { data } = await query;
  allRows = data || [];
  renderTable();
}

function renderTable() {
  const lang = getLang();
  const search = document.getElementById("search-box").value.toLowerCase();
  const rows = allRows.filter((r) => !search
    || r.reference_number?.toLowerCase().includes(search)
    || r.clients?.full_name?.toLowerCase().includes(search)
    || r.clients?.phone_normalized?.includes(search)
    || r.clients?.email?.toLowerCase().includes(search));

  document.getElementById("appointments-table").innerHTML = `
    <thead><tr>
      <th>${lang === "fr" ? "Référence" : "Reference"}</th><th>${lang === "fr" ? "Cliente" : "Client"}</th>
      <th>Service</th><th>${lang === "fr" ? "Date / heure" : "Date / time"}</th><th>${lang === "fr" ? "Prix" : "Price"}</th>
      <th>${lang === "fr" ? "Statut" : "Status"}</th><th>Actions</th>
    </tr></thead>
    <tbody>
      ${rows.map((r) => `
        <tr>
          <td style="font-family:monospace;font-size:0.75rem">${r.reference_number}</td>
          <td><div>${r.clients?.full_name || ""}</div><div class="text-muted" style="font-size:0.75rem">${r.clients?.phone_normalized || ""}</div></td>
          <td>${lang === "en" ? r.services?.name_en : r.services?.name_fr}</td>
          <td>${r.appointment_date} · ${r.start_time?.slice(0, 5)}</td>
          <td>${r.price_estimate_cents != null ? formatPrice(r.price_estimate_cents) : "—"}</td>
          <td><span class="badge badge-${r.status}">${t("status_" + r.status)}</span></td>
          <td>${actionButtons(r)}</td>
        </tr>`).join("")}
      ${rows.length === 0 ? `<tr><td colspan="7" style="text-align:center;padding:2rem" class="text-muted">${lang === "fr" ? "Aucun rendez-vous trouvé." : "No appointments found."}</td></tr>` : ""}
    </tbody>`;

  document.querySelectorAll("[data-action]").forEach((btn) => {
    btn.addEventListener("click", () => setStatus(btn.dataset.id, btn.dataset.action));
  });
}

function actionButtons(r) {
  const lang = getLang();
  const btn = (status, label, danger) => `<button data-action="${status}" data-id="${r.id}" class="btn ${danger ? "btn-danger" : "btn-ghost"}" style="padding:0.3rem 0.7rem;font-size:0.75rem;margin:2px">${label}</button>`;
  let html = "";
  if (r.status === "pending") {
    html += btn("accepted", lang === "fr" ? "Accepter" : "Accept");
    html += btn("rejected", lang === "fr" ? "Refuser" : "Reject", true);
  }
  if (r.status === "accepted" || r.status === "reschedule_requested") {
    html += btn("confirmed", lang === "fr" ? "Confirmer" : "Confirm");
  }
  if (["accepted", "confirmed"].includes(r.status)) {
    html += btn("completed", lang === "fr" ? "Terminé" : "Completed");
    html += btn("no_show", lang === "fr" ? "Absence" : "No-show", true);
    html += btn("cancelled_by_salon", lang === "fr" ? "Annuler" : "Cancel", true);
  }
  return html;
}

async function setStatus(id, status) {
  await sb.from("appointments").update({ status }).eq("id", id);
  loadRows();
}

async function renderContent() {
  const lang = getLang();
  document.getElementById("page-title").textContent = lang === "fr" ? "Rendez-vous" : "Appointments";
  document.getElementById("search-box").placeholder = lang === "fr" ? "Nom, téléphone, courriel, référence…" : "Search name, phone, email, reference…";
  document.getElementById("status-filter").innerHTML = `<option value="all">${lang === "fr" ? "Tous les statuts" : "All statuses"}</option>` +
    STATUSES.map((s) => `<option value="${s}">${t("status_" + s)}</option>`).join("");
  document.getElementById("search-box").addEventListener("input", renderTable);
  document.getElementById("status-filter").addEventListener("change", loadRows);
  await loadRows();
}
document.addEventListener("DOMContentLoaded", () => initAdminPage(renderContent));
</script>
</body>
</html>
