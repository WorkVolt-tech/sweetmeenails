<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Policies — Sweet Mée Nails</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div id="site-header"></div>

<section class="section">
  <div class="container">
    <div class="section-heading">
      <h2 data-i18n="policies_title"></h2>
      <div class="brush-divider"></div>
    </div>
    <div id="policies-list" style="max-width:700px;margin:0 auto;display:flex;flex-direction:column;gap:1rem"></div>
  </div>
</section>

<div id="site-footer"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/site-chrome.js"></script>
<script>
async function loadPolicies() {
  const lang = getLang();
  const { data } = await sb.from("salon_policies").select("*").order("display_order");
  document.getElementById("policies-list").innerHTML = (data || []).map((p) => `
    <div class="card">
      <h3>${lang === "en" ? p.title_en : p.title_fr}</h3>
      <p class="text-muted">${lang === "en" ? p.body_en : p.body_fr}</p>
    </div>`).join("");
}
document.addEventListener("DOMContentLoaded", loadPolicies);
</script>
</body>
</html>
